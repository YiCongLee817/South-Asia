<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>南亞地理配對遊戲</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1b2a;color:#d8eaf8;font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
#header{background:#112234;border-bottom:2px solid #2a4a6a;padding:12px 16px;}
#header h1{font-size:clamp(15px,4vw,20px);color:#f0a500;font-weight:700;letter-spacing:1px;}
#header p{font-size:clamp(11px,2.5vw,13px);color:#7aa0c0;margin-top:5px;line-height:1.7;}
#scorebar{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px;background:#0a1520;border-bottom:1px solid #2a4a6a;align-items:center;}
.score-chip{background:#1a3048;border:1px solid #2a4a6a;border-radius:20px;padding:4px 12px;font-size:12px;color:#7aa0c0;}
.score-chip span{color:#f0a500;font-weight:700;font-size:14px;}
#reset-btn{margin-left:auto;background:transparent;border:1px solid #2a4a6a;color:#7aa0c0;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;}
#reset-btn:hover{border-color:#f0a500;color:#f0a500;}
#instr{padding:9px 16px;background:#0f1e2e;border-bottom:1px solid #2a4a6a;font-size:13px;color:#3ecfcf;}
#map-wrap{position:relative;width:100%;max-width:900px;margin:0 auto;}
#map-img{display:block;width:100%;height:auto;}
#arrow-svg{position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:visible;}
.abox-wrap{position:absolute;transform:translate(-50%,-50%);z-index:10;}
.abox{border-radius:5px;border:2px solid;color:#fff;font-size:clamp(9px,1.6vw,12px);font-family:'Noto Sans TC',sans-serif;text-align:center;padding:3px 6px;cursor:pointer;width:clamp(52px,9vw,86px);user-select:none;-webkit-tap-highlight-color:transparent;white-space:nowrap;overflow:hidden;transition:filter 0.15s;}
.abox:hover{filter:brightness(1.3);}
.abox.sel{outline:3px solid #fff;outline-offset:2px;}
.abox.correct{pointer-events:none;font-weight:700;}
.abox.wrong{animation:shake 0.35s;}
@keyframes shake{0%,100%{transform:translate(-50%,-50%);}25%{transform:translate(calc(-50% - 5px),-50%);}75%{transform:translate(calc(-50% + 5px),-50%);}}
#word-bank-area{padding:12px 16px 18px;background:#112234;border-top:2px solid #2a4a6a;}
.wb-row{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:8px;}
.sec-tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.word-chip{border:2px solid;border-radius:20px;padding:5px 12px;font-size:clamp(11px,2.8vw,14px);cursor:pointer;transition:all 0.15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.word-chip:hover{filter:brightness(1.4);}
.word-chip.sel{outline:3px solid #fff;outline-offset:2px;filter:brightness(1.5);}
.word-chip.used{opacity:0.2;pointer-events:none;text-decoration:line-through;}
#completion{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;}
#completion.show{display:flex;}
#cbox{background:#1a3048;border:2px solid #f0a500;border-radius:16px;padding:36px;text-align:center;max-width:360px;margin:20px;}
#cbox h2{font-size:26px;color:#f0a500;margin-bottom:10px;}
#cbox p{color:#7aa0c0;font-size:14px;margin-bottom:22px;}
#cbox button{background:#f0a500;color:#000;border:none;padding:11px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="header">
  <h1>🌏 南亞地理配對遊戲</h1>
  <p><b>遊戲說明：</b>先從下方詞庫點選一個地名，再點地圖上<b>對應顏色</b>的方格作答。共 30 題，涵蓋國家、地形、海域島嶼、城市、河流、板塊六大類別。</p>
</div>

  <button id="reset-btn" onclick="resetGame()">🔄 重新開始</button>
</div>

<script>
const COORDS={"印度": {"x": 42.98, "y": 46.5, "section": "國家"}, "巴基斯坦": {"x": 13.26, "y": 33.49, "section": "國家"}, "孟加拉": {"x": 81.53, "y": 49.88, "section": "國家"}, "尼泊爾": {"x": 59.68, "y": 36.58, "section": "國家"}, "不丹": {"x": 73.92, "y": 38.5, "section": "國家"}, "斯里蘭卡": {"x": 55.26, "y": 92.71, "section": "國家"}, "馬爾地夫": {"x": 36.1, "y": 94.16, "section": "國家"}, "喜馬拉雅山": {"x": 51.08, "y": 26.94, "section": "地形"}, "印度大平原": {"x": 58.2, "y": 45.97, "section": "地形"}, "德干高原": {"x": 46.91, "y": 67.42, "section": "地形"}, "塔爾沙漠": {"x": 25.54, "y": 35.61, "section": "地形"}, "青藏高原": {"x": 73.67, "y": 21.88, "section": "地形"}, "孟加拉灣": {"x": 76.62, "y": 72.72, "section": "海域與島嶼"}, "印度洋": {"x": 45.19, "y": 98.98, "section": "海域與島嶼"}, "阿拉伯海": {"x": 15.72, "y": 69.58, "section": "海域與島嶼"}, "錫蘭島": {"x": 57.96, "y": 94.16, "section": "海域與島嶼"}, "馬爾地夫群島": {"x": 36.35, "y": 96.33, "section": "海域與島嶼"}, "新德里": {"x": 42.73, "y": 35.61, "section": "城市"}, "孟買": {"x": 33.89, "y": 61.63, "section": "城市"}, "加爾各答": {"x": 70.73, "y": 55.85, "section": "城市"}, "喀拉蚩": {"x": 15.96, "y": 42.6, "section": "城市"}, "達卡": {"x": 84.48, "y": 49.34, "section": "城市"}, "伊斯蘭瑪巴德": {"x": 24.8, "y": 16.34, "section": "城市"}, "恆河": {"x": 48.38, "y": 40.43, "section": "河流"}, "印度河": {"x": 25.54, "y": 25.73, "section": "河流"}, "雅魯藏布江": {"x": 88.41, "y": 30.31, "section": "河流"}, "印度-澳洲板塊": {"x": 51.08, "y": 74.16, "section": "板塊"}, "阿拉伯板塊": {"x": 4.91, "y": 59.95, "section": "板塊"}, "印度板塊": {"x": 4.91, "y": 92.23, "section": "板塊"}, "歐亞板塊": {"x": 64.1, "y": 21.15, "section": "板塊"}};
const ARROW_OFFSETS={"達卡": {"lx": 93.0, "ly": 51.5}, "斯里蘭卡": {"lx": 44.0, "ly": 87.0}, "錫蘭島": {"lx": 68.0, "ly": 87.0}, "馬爾地夫群島": {"lx": 20.0, "ly": 89.5}, "馬爾地夫": {"lx": 27.0, "ly": 92.5}};
const DIRECT_MOVE={"孟加拉": {"x": 84.43, "y": 46.03}};
const SEC_COLORS={"國家": {"bg": "#cc2222", "border": "#ff6666", "text": "#fff"}, "地形": {"bg": "#b86200", "border": "#ffaa00", "text": "#fff"}, "海域與島嶼": {"bg": "#1070dd", "border": "#55aaff", "text": "#fff"}, "城市": {"bg": "#157a40", "border": "#33dd77", "text": "#fff"}, "河流": {"bg": "#7722cc", "border": "#bb66ff", "text": "#fff"}, "板塊": {"bg": "#b8186e", "border": "#ff55bb", "text": "#fff"}};
const SECTION_ORDER=["國家", "地形", "海域與島嶼", "城市", "河流", "板塊"];
let sel=null,cc=0,wc=0;
const total=Object.keys(COORDS).length;

function init(){
  cc=0;wc=0;sel=null;updateScore();buildMap();buildWordBank();
  document.getElementById('instr-text').innerHTML='👆 請先從下方選取一個地名，再點地圖上對應顏色的方格';
}

function buildMap(){
  const wrap=document.getElementById('map-wrap');
  wrap.querySelectorAll('.abox-wrap').forEach(e=>e.remove());
  document.getElementById('arrow-svg').innerHTML='';
  Object.entries(COORDS).forEach(([name,data])=>{
    const sec=data.section,col=SEC_COLORS[sec];
    const off=ARROW_OFFSETS[name],mv=DIRECT_MOVE[name];
    const lx=mv?mv.x:(off?off.lx:data.x);
    const ly=mv?mv.y:(off?off.ly:data.y);
    const bw=document.createElement('div');
    bw.className='abox-wrap';
    bw.style.left=lx+'%';bw.style.top=ly+'%';
    const box=document.createElement('div');
    box.className='abox';
    box.dataset.answer=name;box.dataset.section=sec;
    box.style.background=col.bg+'cc';box.style.borderColor=col.border;box.style.color='#fff';
    box.textContent='?';
    if(off&&!mv){
      box.dataset.needArrow='1';
      box.dataset.tx=data.x;box.dataset.ty=data.y;
      box.dataset.lx=lx;box.dataset.ly=ly;
      box.dataset.arrowColor=col.border;
    }
    box.addEventListener('click',()=>handleBoxClick(box));
    bw.appendChild(box);wrap.appendChild(bw);
  });
  requestAnimationFrame(()=>requestAnimationFrame(drawArrows));
}

function drawArrows(){
  const wrap=document.getElementById('map-wrap');
  const svg=document.getElementById('arrow-svg');
  svg.innerHTML='';
  const W=wrap.offsetWidth,H=document.getElementById('map-img').offsetHeight;
  if(!H)return;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.height=H+'px';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
  mk.setAttribute('id','ah');mk.setAttribute('markerWidth','7');mk.setAttribute('markerHeight','5');
  mk.setAttribute('refX','7');mk.setAttribute('refY','2.5');mk.setAttribute('orient','auto');
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points','0 0,7 2.5,0 5');poly.setAttribute('fill','rgba(255,255,255,0.75)');
  mk.appendChild(poly);defs.appendChild(mk);svg.appendChild(defs);
  wrap.querySelectorAll('.abox[data-need-arrow="1"]').forEach(box=>{
    const tx=parseFloat(box.dataset.tx)/100*W,ty=parseFloat(box.dataset.ty)/100*H;
    const lx=parseFloat(box.dataset.lx)/100*W,ly=parseFloat(box.dataset.ly)/100*H;
    const color=box.dataset.arrowColor;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',lx);line.setAttribute('y1',ly);
    line.setAttribute('x2',tx);line.setAttribute('y2',ty);
    line.setAttribute('stroke',color);line.setAttribute('stroke-width','1.5');
    line.setAttribute('stroke-dasharray','5,3');line.setAttribute('marker-end','url(#ah)');
    svg.appendChild(line);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',tx);c.setAttribute('cy',ty);c.setAttribute('r','4');c.setAttribute('fill',color);
    svg.appendChild(c);
  });
}

function buildWordBank(){
  const area=document.getElementById('word-bank-area');area.innerHTML='';
  const groups={};
  Object.entries(COORDS).forEach(([name,data])=>{
    if(!groups[data.section])groups[data.section]=[];
    groups[data.section].push(name);
  });
  SECTION_ORDER.forEach(sec=>{
    if(!groups[sec])return;
    const col=SEC_COLORS[sec];
    const row=document.createElement('div');row.className='wb-row';
    const tag=document.createElement('div');tag.className='sec-tag';
    tag.style.background=col.bg;tag.style.color='#fff';tag.style.border='2px solid '+col.border;
    tag.textContent=sec;row.appendChild(tag);
    groups[sec].forEach(name=>{
      const chip=document.createElement('div');chip.className='word-chip';
      chip.dataset.name=name;chip.dataset.section=sec;
      chip.style.background=col.bg+'44';chip.style.borderColor=col.border;chip.style.color='#fff';
      chip.textContent=name;
      chip.addEventListener('click',()=>selectWord(chip));
      row.appendChild(chip);
    });
    area.appendChild(row);
  });
}

function selectWord(chip){
  if(chip.classList.contains('used'))return;
  clearSel();
  if(sel===chip.dataset.name){sel=null;updateInstr(null);return;}
  sel=chip.dataset.name;chip.classList.add('sel');
  document.querySelectorAll(`.abox[data-section="${chip.dataset.section}"]`).forEach(b=>{
    if(!b.classList.contains('correct'))b.style.filter='brightness(1.4)';
  });
  updateInstr(chip.dataset.name,chip.dataset.section);
}

function handleBoxClick(box){
  if(box.classList.contains('correct'))return;
  if(!sel){updateInstr(null,null,true);return;}
  if(sel===box.dataset.answer){
    const sec=box.dataset.section,col=SEC_COLORS[sec];
    box.textContent=sel;box.classList.add('correct');
    box.style.filter='none';box.style.background=col.bg;box.style.borderColor=col.border;
    const chip=document.querySelector(`.word-chip[data-name="${sel}"]`);
    if(chip){chip.classList.remove('sel');chip.classList.add('used');}
    cc++;sel=null;clearSel();updateScore();updateInstr(null);
    if(cc===total)setTimeout(showCompletion,400);
  } else {
    box.classList.add('wrong');wc++;updateScore();
    setTimeout(()=>box.classList.remove('wrong'),400);
  }
}

function clearSel(){
  document.querySelectorAll('.word-chip.sel').forEach(c=>c.classList.remove('sel'));
  document.querySelectorAll('.abox').forEach(b=>{if(!b.classList.contains('correct'))b.style.filter='';});
}

function updateInstr(word,sec,needSelect=false){
  const el=document.getElementById('instr-text');
  if(needSelect){el.innerHTML='⚠️ 請先從下方詞庫選取一個地名！';return;}
  if(!word){el.innerHTML='👆 請先從下方選取一個地名，再點地圖上對應顏色的方格';return;}
  const col=SEC_COLORS[sec];
  el.innerHTML=`已選取：<strong style="color:${col.border}">${word}</strong> <span style="color:#7aa0c0;font-size:12px;">[${sec}]</span> ── 點地圖上<span style="color:${col.border}">同色方格</span>作答`;
}

function updateScore(){
  document.getElementById('cc').textContent=cc;
  document.getElementById('wc').textContent=wc;
  document.getElementById('rc').textContent=total-cc;
}

function showCompletion(){
  const acc=Math.round(cc/(cc+wc)*100);
  document.getElementById('cmsg').textContent=`全部${total}題完成！答錯${wc}次，正確率${acc}%。`;
  document.getElementById('completion').classList.add('show');
}

function resetGame(){document.getElementById('completion').classList.remove('show');init();}
window.addEventListener('resize',()=>requestAnimationFrame(drawArrows));
document.getElementById('map-img').addEventListener('load',()=>requestAnimationFrame(drawArrows));
document.getElementById('map-wrap').addEventListener('click',(e)=>{
  if(e.target.id==='map-img'){clearSel();if(sel){sel=null;updateInstr(null);}}
});
init();
</script>
</body>
</html>
